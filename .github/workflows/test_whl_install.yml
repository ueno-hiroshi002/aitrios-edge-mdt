name: Test whl install

on:
  workflow_dispatch:
    inputs:
      EDGE_MDT_VERSION:
        description: "Version of Edge MDT"
        required: true
      IMX500_CONVERTER_VERSION:
        description: "Version of IMX500 Converter"
        required: true
      MCT_VERSION:
        description: "Version of MCT"
        required: true
      TPC_VERSION:
        description: "version of edge-mdt-tpc"
        required: true

jobs:
  build_and_run_pytorch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build
        run: |
          EDGE_MDT_VERSION=${{ github.event.inputs.EDGE_MDT_VERSION }} \
          IMX500_CONVERTER_VERSION=${{ github.event.inputs.IMX500_CONVERTER_VERSION }} \
          MCT_VERSION=${{ github.event.inputs.MCT_VERSION }} \
          TPC_VERSION=${{ github.event.inputs.TPC_VERSION }} ./build.sh

      - name: Install WHL file
        run: |
          whl_file=$(find . -iname "*.whl")
          echo $whl_file
          pip install "$whl_file[pt]"
          pip list | grep -e model -e mct -e edge -e imx500 -e uni
          imxconv-pt -v

  build_and_run_tensorflow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build
        run: |
          EDGE_MDT_VERSION=${{ github.event.inputs.EDGE_MDT_VERSION }} \
          IMX500_CONVERTER_VERSION=${{ github.event.inputs.IMX500_CONVERTER_VERSION }} \
          MCT_VERSION=${{ github.event.inputs.MCT_VERSION }} \
          TPC_VERSION=${{ github.event.inputs.TPC_VERSION }} ./build.sh

      - name: Install WHL file
        run: |
          whl_file=$(find . -iname "*.whl")
          echo $whl_file
          pip install "$whl_file[tf]"
          pip list | grep -e model -e mct -e edge -e imx500 -e uni
          imxconv-tf -v